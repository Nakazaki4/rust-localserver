servers:
    - host: "127.0.0.1"
      port: 8080
      default: true
      max_body_size: 10485760
      error_pages:
          400: "./error_pages/400.html"
          403: "./error_pages/403.html"
          404: "./error_pages/404.html"
          405: "./error_pages/405.html"
          413: "./error_pages/413.html"
          500: "./error_pages/500.html"
      routes:
          - path: "/"
            root: "./www"
            methods:
                - "GET"
            index: "index.html"
            directory_listing: false
          - path: "/uploads"
            root: "./uploads"
            methods:
                - "GET"
                - "POST"
                - "DELETE"
            upload: true
          - path: "/redirect"
            redirect: "/new-location"
            methods:
                - "GET"
          - path: "/cgi"
            root: "./cgi"
            methods:
                - "GET"
                - "POST"
            cgi:
                extension: ".py"

    - host: "127.0.0.1"
      port: 9090
      max_body_size: 5242880
      routes:
          - path: "/"
            root: "./admin"
            methods:
                - "GET"
            index: "dashboard.html"
          - path: "/scripts"
            root: "./scripts"
            methods:
                - "GET"
            cgi:
                extension: ".py"
